---
version: 2.1

orbs:
  qqq-orb: kingsrook/qqq-orb@0.6

executors:
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.58.2-jammy

jobs:
  playwright_tests:
    executor: playwright
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-{{ checksum "package-lock.json" }}
            - npm-deps-
      - run:
          name: Install dependencies
          command: npm ci --legacy-peer-deps
      - save_cache:
          key: npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Run Playwright visual regression tests
          command: npx playwright test
      - store_artifacts:
          path: playwright-report/
          destination: playwright-report
      - store_test_results:
          path: test-results/

workflows:
  test_only:
    jobs:
      - playwright_tests:
          filters:
            branches:
              ignore: /(develop|main|release/.*|hotfix/.*)/
            tags:
              only: []
      - qqq-orb/mvn_frontend_test_only:
          context: [qqq-maven-registry-credentials]
          filters:
            branches:
              ignore: /(develop|main|release/.*|hotfix/.*)/
            tags:
              only: []

  publish_snapshot:
    jobs:
      - playwright_tests:
          filters:
            branches:
              only:
                - develop
      - qqq-orb/mvn_frontend_publish:
          context: [qqq-maven-registry-credentials]
          branch_type: snapshot
          requires:
            - playwright_tests
          filters:
            branches:
              only:
                - develop

  publish_feature:
    jobs:
      - qqq-orb/mvn_frontend_publish:
          context: [qqq-maven-registry-credentials]
          branch_type: feature
          filters:
            branches:
              only:
                - feature/.*
            tags:
              only: [/publish.*/]

  publish_release_candidate:
    jobs:
      - qqq-orb/mvn_frontend_publish:
          context: [qqq-maven-registry-credentials]
          branch_type: release_candidate
          filters:
            branches:
              only:
                - /release\/.*/

  publish_release:
    jobs:
      - qqq-orb/mvn_frontend_publish:
          context: [qqq-maven-registry-credentials]
          branch_type: release
          filters:
            branches:
              ignore: /.*/
            tags:
              only: [/v.*/]

  publish_hotfix_release:
    jobs:
      - qqq-orb/mvn_frontend_publish:
          context: [qqq-maven-registry-credentials]
          branch_type: hotfix
          filters:
            branches:
              only:
                - /hotfix\/.*/
