version: 2.1

orbs:
  qqq-orb: kingsrook/qqq-orb@dev:snapshot

workflows:

  test_only:
    jobs:
      - qqq-orb/test_only:
          context: [ qqq-maven-registry-credentials, build-qqq-sample-app ]
          include_integrated_frontend_build: true
          filters:
            branches:
              ignore: /(develop|main|release/.*|hotfix/.*|integration.*)/
            tags:
              only: []  

  publish_snapshot:
    jobs:
      - qqq-orb/publish_snapshot:
          include_integrated_frontend_build: true
          context: [ qqq-maven-registry-credentials, build-qqq-sample-app ]
          filters:
            branches:
              only:
                - develop

  publish_release_candidate:
    jobs:
      - qqq-orb/publish_release_candidate:
          include_integrated_frontend_build: true
          context: [ qqq-maven-registry-credentials, build-qqq-sample-app ]
          filters:
            branches:
              only:
                - /release\/.*/

  publish_release:
    jobs:
      - qqq-orb/publish_release:
          include_integrated_frontend_build: true
          context: [ qqq-maven-registry-credentials, build-qqq-sample-app ]
          filters:
            branches:
              only: [ main ]
            tags:
              only: [ /v.*/ ]

  publish_hotfix_release:
    jobs:
      - qqq-orb/publish_hotfix_release:
          include_integrated_frontend_build: true
          context: [ qqq-maven-registry-credentials, build-qqq-sample-app ]
          filters:
            branches:
              only:
                - /hotfix\/.*/
